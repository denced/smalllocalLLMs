name: Catalog refresh

# Daily check for new mlx-community 4-bit instruct models. When candidates
# are found, opens a draft PR with the additions for human review. Editorial
# fields like `bestFor` and `contextWindow` are intentionally left as
# `[TODO: ...]` placeholders so the PR can't be merged blindly.

on:
  schedule:
    - cron: '0 9 * * *'  # 09:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run discovery script
        run: python3 scripts/discover_models.py

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet models.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No catalog changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Catalog changed:"
            git diff --stat models.json
          fi

      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="catalog-refresh-${DATE}-${{ github.run_number }}"
          git config user.name "youme-catalog-bot"
          git config user.email "actions@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add models.json
          git commit -m "chore: catalog refresh ${DATE}"
          git push origin "$BRANCH"
          gh pr create \
            --title "Catalog refresh: ${DATE}" \
            --body "Auto-generated by \`.github/workflows/catalog-refresh.yml\`.

**Review checklist before merging:**

- [ ] Each new entry has a real \`bestFor\` tagline (not \`[TODO: tagline]\`)
- [ ] Each new entry has a real \`contextWindow\` (not \`[TODO: context window]\`)
- [ ] Any \`[TODO: license]\` placeholders replaced with the actual license name
- [ ] At least one device test load: pick the largest new model in the picker on a real iPhone, confirm it downloads and replies in chat
- [ ] \`displayName\` reads naturally (the auto-derivation can produce odd spacing)
- [ ] \`minRamGB\` heuristic looks right (heuristic is: ≤1B → 4.0, ≤2.5B → 5.5, else → 7.5)

If a candidate is wrong (broken model, weird quant, deprecated), close this PR and add the id to the EXCLUDE regex in \`scripts/discover_models.py\`." \
            --base main \
            --head "$BRANCH" \
            --draft
